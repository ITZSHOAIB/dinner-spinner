    <!--
      GitHub Pages SPA redirect decoder. If we were sent here from 404.html
      with an encoded ?/foo/bar path, decode it back into a real path before
      React mounts so BrowserRouter sees the intended route.
    -->
    <script>
      (function () {
        var l = window.location
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })()
    </script>
