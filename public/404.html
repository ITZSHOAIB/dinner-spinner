<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D97706" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex" />
    <title>404 — This dish slipped off the spinner | Dinner Spinner</title>
    <link rel="icon" type="image/svg+xml" href="/dinner-spinner/favicon.svg" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, sans-serif;
        background:
          radial-gradient(circle at 80% 20%, rgba(217, 119, 6, 0.18), transparent 50%),
          radial-gradient(circle at 20% 80%, rgba(220, 38, 38, 0.12), transparent 50%),
          linear-gradient(180deg, #1c1917 0%, #0c0a09 100%);
        color: #fafaf9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        overflow: hidden;
        position: relative;
      }

      /* Floating sesame seeds */
      .seed {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(217, 119, 6, 0.4);
        animation: float 8s ease-in-out infinite;
      }
      .seed:nth-child(1) { top: 12%; left: 8%; animation-delay: 0s; }
      .seed:nth-child(2) { top: 24%; left: 88%; animation-delay: 1s; background: rgba(220, 38, 38, 0.4); }
      .seed:nth-child(3) { top: 70%; left: 12%; animation-delay: 2s; }
      .seed:nth-child(4) { top: 80%; left: 82%; animation-delay: 3s; background: rgba(220, 38, 38, 0.4); }
      .seed:nth-child(5) { top: 40%; left: 4%; animation-delay: 4s; width: 4px; height: 4px; }
      .seed:nth-child(6) { top: 50%; left: 94%; animation-delay: 1.5s; width: 4px; height: 4px; }

      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; }
        50% { transform: translateY(-30px) translateX(10px); opacity: 0.8; }
      }

      .card {
        position: relative;
        z-index: 1;
        max-width: 540px;
        width: 100%;
        text-align: center;
      }

      /* Broken spinner — three reels showing nonsense */
      .reels {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        margin-bottom: 2.25rem;
        perspective: 600px;
      }
      .reel {
        width: 88px;
        height: 110px;
        background: linear-gradient(180deg, #292524, #1c1917);
        border: 2px solid rgba(217, 119, 6, 0.4);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.4rem;
        font-weight: 700;
        color: #fafaf9;
        position: relative;
        overflow: hidden;
        box-shadow:
          inset 0 -16px 24px -10px rgba(0, 0, 0, 0.6),
          inset 0 16px 24px -10px rgba(0, 0, 0, 0.6),
          0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .reel::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.5) 0%,
          transparent 30%,
          transparent 70%,
          rgba(0, 0, 0, 0.5) 100%
        );
        pointer-events: none;
      }
      .reel-1 { animation: wobble1 3s ease-in-out infinite; }
      .reel-2 { animation: wobble2 3.4s ease-in-out infinite 0.2s; }
      .reel-3 { animation: wobble3 2.8s ease-in-out infinite 0.4s; }

      @keyframes wobble1 {
        0%, 100% { transform: rotate(-4deg) translateY(0); }
        50% { transform: rotate(4deg) translateY(-6px); }
      }
      @keyframes wobble2 {
        0%, 100% { transform: rotate(2deg) translateY(-3px); }
        50% { transform: rotate(-3deg) translateY(3px); }
      }
      @keyframes wobble3 {
        0%, 100% { transform: rotate(-2deg) translateY(2px); }
        50% { transform: rotate(5deg) translateY(-4px); }
      }

      /* Big 404 */
      .code {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        font-weight: 800;
        font-size: clamp(4.5rem, 14vw, 7.5rem);
        line-height: 1;
        margin: 0 0 0.5rem;
        background: linear-gradient(135deg, #fbbf24 0%, #D97706 50%, #DC2626 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.04em;
      }

      h1 {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: clamp(1.4rem, 3.6vw, 1.85rem);
        margin: 0 0 0.75rem;
        color: #fafaf9;
      }

      p.lede {
        color: #a8a29e;
        font-size: 1rem;
        line-height: 1.55;
        margin: 0 auto 2rem;
        max-width: 380px;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.4rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        border: 1px solid transparent;
      }
      .btn-primary {
        background: linear-gradient(135deg, #D97706, #DC2626);
        color: #fff;
        box-shadow: 0 6px 20px -6px rgba(217, 119, 6, 0.6);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px -6px rgba(217, 119, 6, 0.7);
      }
      .btn-secondary {
        background: rgba(41, 37, 36, 0.8);
        color: #fafaf9;
        border-color: rgba(217, 119, 6, 0.3);
      }
      .btn-secondary:hover {
        background: rgba(41, 37, 36, 1);
        border-color: rgba(217, 119, 6, 0.6);
      }

      .redirect-note {
        margin-top: 2rem;
        font-size: 0.78rem;
        color: #78716c;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .redirect-note .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #D97706;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* Crawler-friendly nav: hidden visually but still present in DOM */
      .crawler-nav {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #57534e;
      }
      .crawler-nav a {
        color: #a8a29e;
        text-decoration: underline;
        text-decoration-color: rgba(168, 162, 158, 0.3);
        margin: 0 0.5rem;
      }

      @media (prefers-reduced-motion: reduce) {
        .reel-1, .reel-2, .reel-3, .seed, .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <span class="seed"></span>
    <span class="seed"></span>
    <span class="seed"></span>
    <span class="seed"></span>
    <span class="seed"></span>
    <span class="seed"></span>

    <div class="card">
      <div class="reels" aria-hidden="true">
        <div class="reel reel-1">?</div>
        <div class="reel reel-2">!</div>
        <div class="reel reel-3">?</div>
      </div>

      <div class="code">404</div>
      <h1>This dish slipped off the spinner.</h1>
      <p class="lede">
        The recipe you were after isn't on the menu — maybe a typo, maybe it
        was retired. Spin again, or browse the full collection.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="/dinner-spinner/">
          Back to the spinner
        </a>
        <a class="btn btn-secondary" href="/dinner-spinner/recipes">
          Browse all recipes
        </a>
      </div>

      <div class="redirect-note" id="redirect-note">
        <span class="dot"></span>
        Taking you back to the kitchen…
      </div>

      <nav class="crawler-nav">
        <a href="/dinner-spinner/">Home</a> ·
        <a href="/dinner-spinner/recipes">Recipes</a> ·
        <a href="/dinner-spinner/sitemap.xml">Sitemap</a> ·
        <a href="/dinner-spinner/llms.txt">llms.txt</a>
      </nav>
    </div>

    <!--
      GitHub Pages SPA redirect — encodes the requested path into a query
      string on the app root so index.html can decode and replay it via
      history.replaceState. Based on https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        // Number of path segments in the app's base path. For repo-scoped
        // Pages (e.g. username.github.io/dinner-spinner/) this is 1.
        var segmentCount = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </body>
</html>
