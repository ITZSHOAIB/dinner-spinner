name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        For loose brainstorming, consider starting a [Discussion](../../discussions)
        first. Use this template when you have a concrete feature in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user experience gap first — not the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      placeholder: Mockups, references, links to similar features in other apps
